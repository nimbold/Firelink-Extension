name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 2.0.1"
        required: true
        default: "2.0.6"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Verify extension packages
        run: npm run check

      - name: Create ZIP Archives
        run: |
          (cd dist/firefox && zip -r ../../firelink-firefox.zip .)
          cp firelink-firefox.zip firelink.zip
          (cd dist/chromium && zip -r ../../firelink-chromium.zip .)

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.version }}"
            TAG_NAME="v${VERSION}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{if(flag) exit} flag' CHANGELOG.md > release_notes.md
          test -s release_notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" firelink.zip firelink-firefox.zip firelink-chromium.zip --clobber
            gh release edit "$TAG_NAME" --notes-file release_notes.md
          else
            gh release create "$TAG_NAME" firelink.zip firelink-firefox.zip firelink-chromium.zip --title "$TAG_NAME" --notes-file release_notes.md --verify-tag
          fi
